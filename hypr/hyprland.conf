# This is an example Hyprland config file.
# Syntax is the same as in Hypr, but settings might differ.
#
# Refer to the wiki for more information.
# owo


input {
    kb_layout=us
    kb_variant=altgr-intl
    kb_model=
    kb_options=
    kb_rules=

    follow_mouse=1

    touchpad {
        disable_while_typing = false
        clickfinger_behavior = true
        natural_scroll = true
    }
}

general {
    gaps_in=5
    gaps_out=12
    border_size=2
    col.active_border=0xFFcba6f7 0xFF89b4fa 45deg
    col.inactive_border=0xFF45475a
}

decoration {
    rounding=15
    blur {
        enabled = false
	size = 1
	passes = 1
    }
}

animations {
    enabled=1
    bezier=UWU1,0.22, 1, 0.36, 1
    animation=windows,1,5,UWU1,slide
    animation=fade,1,3,default
    animation=workspaces,1,4,UWU1,slidevert
}

dwindle {
    pseudotile=0 # enable pseudotiling on dwindle
}

xwayland {
    force_zero_scaling = true
}

debug {
  damage_tracking = 0
}

# example window rules
# for windows named/classed as abc and xyz
#windowrule=move 69 420,abc
#windowrule=size 420 69,abc
#windowrule=tile,xyz
#windowrule=float,abc
#windowrule=pseudo,abc
#windowrule=monitor 0,xyz

# example binds
bind=SUPER,RETURN,exec,kitty
bind=SUPER,X,killactive,
bind=SUPERSHIFT,X,exec,hyprctl kill
bind=SUPER,V,togglefloating,
bind=SUPER,Z,global,quickshell:togglePowerMenu
bind=SUPER,B,exec,floorp
bind=SUPER,d,exec,discord
bind=SUPER,f,fullscreen,0
bind=SUPER,q,exec,~/.config/scripts/bar_toggle.sh
bind=SUPERSHIFT,f,fullscreen,1
bind=SUPERSHIFT,Q,exec,hyprctl reload
bind=SUPERSHIFT,E,exit
bind=SUPER,L,exec,hyprlock
bind=SUPER,code:60,exec,playerctl --player spotifyd,%any next
bind=SUPER,code:59,exec,playerctl --player spotifyd,%any previous
bind=SUPER,space,exec,playerctl --player spotifyd,%any play-pause
bind=,Print,exec,~/.config/scripts/hyprland_capture_full.sh
bind=SUPER,Print,exec,~/.config/scripts/hyprland_capture_partial.sh
bind=SHIFT,Print,exec,bash -c 'pgrep -x wf-recorder && bash /storage/git/dotfiles/scripts/hyprland_record_stop.sh || bash /storage/git/dotfiles/scripts/hyprland_record_full.sh'
bind=SUPERSHIFT,Print,exec,bash -c 'pgrep -x wf-recorder && bash /storage/git/dotfiles/scripts/hyprland_record_stop.sh || bash /storage/git/dotfiles/scripts/hyprland_record_region.sh'

bind=SUPER,left,movefocus,l
bind=SUPER,right,movefocus,r
bind=SUPER,up,movefocus,u
bind=SUPER,down,movefocus,d

bind=,F4,exec,pactl set-source-mute @DEFAULT_SOURCE@ 0
bindr=,F4,exec,pactl set-source-mute @DEFAULT_SOURCE@ 1
bind=SUPER,M,exec,pactl set-source-mute @DEFAULT_SOURCE@ 0

bind=,F1,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=,F2,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=,F3,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=SUPER,F4,exec,pactl set-source-mute @DEFAULT_SOURCE@ toggle

bind = SUPER, N, global, quickshell:toggleDashboard
bind = SUPER, W, global, quickshell:toggleWallpaperSelector
bind = SUPER, R, global, quickshell:toggleAppSelector

bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

# Workspaces (split-monitor-workspaces plugin)
bind=SUPER,1,split-workspace,1
bind=SUPER,2,split-workspace,2
bind=SUPER,3,split-workspace,3
bind=SUPER,4,split-workspace,4
bind=SUPER,5,split-workspace,5
bind=SUPER,6,split-workspace,6
bind=SUPER,7,split-workspace,7
bind=SUPER,8,split-workspace,8
bind=SUPER,9,split-workspace,9
bind=SUPER,0,split-workspace,10

bind=ALT,1,split-movetoworkspace,1
bind=ALT,2,split-movetoworkspace,2
bind=ALT,3,split-movetoworkspace,3
bind=ALT,4,split-movetoworkspace,4
bind=ALT,5,split-movetoworkspace,5
bind=ALT,6,split-movetoworkspace,6
bind=ALT,7,split-movetoworkspace,7
bind=ALT,8,split-movetoworkspace,8
bind=ALT,9,split-movetoworkspace,9
bind=ALT,0,split-movetoworkspace,10

plugin {
  split-monitor-workspaces {
    count = 10
    keep_focused = 1
    enable_persistent_workspaces = 1
    enable_notifications = 0
  }
}

exec-once = hyprpm reload -n
exec-once = QT_QPA_PLATFORMTHEME=qt6ct quickshell
exec-once = ~/.config/scripts/init/wallpaper.sh
exec-once=nm-applet &
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
#exec-once=wl-clip-persist --clipboard regular

env = GTK_THEME,Material-DeepOcean-Borderless
env = MOZ_ENABLE_WAYLAND,1

env = LIBVA_DRIVER_NAME,radeonsi
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,radeonsi
env = WLR_NO_HARDWARE_CURSORS,1

env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb

source = ~/.config/hypr/perdevice.conf

